<div class="page-wrapper">

  <div class="content-card">

    <!-- Área reservada para filtros e botões -->
    <div class="actions-row">
      <button class="btn-primary" (click)="navegarPara('/cadastro-usuarios')">
        <mat-icon>add</mat-icon>
        Cadastrar
      </button>
    </div>

    <div class="table-container">

      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- Nome Column -->
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef> Nome </th>
          <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> E-mail </th>
          <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>

        <!-- Ações Column -->
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let element">
            <button class="btn-acao-editar" (click)="editarUsuario(element.id)">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="btn-acao-excluir" (click)="excluirUsuario(element.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <div class="paginacao">
        <mat-paginator [pageSize]="5"
                [pageSizeOptions]="[5, 10, 25, 100]"
                showFirstLastButtons
                aria-label="Select page">
        </mat-paginator>
      </div>

    </div>

  </div>

</div>
