<div class="dialog-overlay" (click)="voltar()">
  <div class="dialog-container" (click)="$event.stopPropagation()">
    <h2 class="form-titulo">Editar Usuário</h2>

    <form [formGroup]="form" (ngSubmit)="salvar()" class="form-campos">

      <mat-form-field appearance="outline" class="campo-completo">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" placeholder="Informe o nome" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo-completo">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Informe o e-mail" />
      </mat-form-field>

      <div class="form-acoes">
        <button class="btn-secondary" type="button" (click)="voltar()">
          <mat-icon>arrow_back</mat-icon> Voltar
        </button>
        <button class="btn-primary" type="submit" [disabled]="form.invalid">
          <mat-icon>save</mat-icon> Salvar
        </button>
      </div>

    </form>
  </div>
</div>
